<svg viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', Courier, monospace">
  <defs>
    <style>
      .bar-fill {
        animation: barGrow 1.2s ease both;
      }
      .b1 { animation-delay: 0.5s; }
      .b2 { animation-delay: 0.7s; }
      .b3 { animation-delay: 0.9s; }
      .b4 { animation-delay: 1.1s; }
      .b5 { animation-delay: 1.3s; }
      @keyframes barGrow {
        from { transform: scaleX(0); }
        to   { transform: scaleX(1); }
      }

      .stat-num {
        animation: countUp 1s ease both;
      }
      .n1 { animation-delay: 0.6s; }
      .n2 { animation-delay: 0.8s; }
      .n3 { animation-delay: 1.0s; }
      .n4 { animation-delay: 1.2s; }
      @keyframes countUp {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .fade-in { animation: fadeIn 0.5s ease both; }
      .f1 { animation-delay: 0.2s; }
      .f2 { animation-delay: 0.4s; }
      .f3 { animation-delay: 0.6s; }
      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }

      .border-draw {
        stroke-dasharray: 2200;
        stroke-dashoffset: 2200;
        animation: drawB 1.2s ease 0.1s forwards;
      }
      @keyframes drawB {
        to { stroke-dashoffset: 0; }
      }

      .pulse-dot {
        animation: pulseDot 2s ease-in-out infinite;
      }
      @keyframes pulseDot {
        0%, 100% { r: 4; opacity: 0.8; }
        50%       { r: 6; opacity: 1; }
      }

      .streak-glow {
        animation: streakGlow 2s ease-in-out infinite;
      }
      @keyframes streakGlow {
        0%, 100% { filter: drop-shadow(0 0 4px #00ff88); }
        50%       { filter: drop-shadow(0 0 12px #00ff88); }
      }
    </style>

    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080e08"/>
      <stop offset="100%" stop-color="#050c05"/>
    </linearGradient>

    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00cc66"/>
    </linearGradient>

    <linearGradient id="barGradDim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a5533"/>
      <stop offset="100%" stop-color="#0f3322"/>
    </linearGradient>

    <linearGradient id="divider" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00ff88" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="900" height="220" rx="6" fill="url(#bg4)"/>
  <rect class="border-draw" x="1" y="1" width="898" height="218" rx="5" fill="none" stroke="#00ff88" stroke-width="0.8" opacity="0.4"/>

  <!-- Header -->
  <g class="fade-in f1">
    <text x="20" y="30" font-size="10" fill="#00ff88" opacity="0.4" letter-spacing="3">── GITHUB.STATS ────────────────────────────────────────────────────────</text>
    <text x="20" y="50" font-size="11" fill="#00ff88" opacity="0.3">$ gh api /users/abhinav25232354 | jq</text>
  </g>

  <!-- Vertical divider -->
  <rect x="430" y="55" width="1" height="145" fill="url(#divider)"/>

  <!-- ── LEFT PANEL: Language bars ── -->
  <g class="fade-in f2">
    <text x="20" y="72" font-size="10" fill="#00ff88" opacity="0.5">top_languages:</text>
  </g>

  <!-- Python -->
  <g>
    <text x="20" y="92" font-size="10" fill="#4aaa77" class="fade-in f2">Python</text>
    <text x="100" y="92" font-size="10" fill="#00ff88" class="stat-num n1">68%</text>
    <rect x="140" y="82" width="260" height="8" rx="2" fill="#0a1a0a"/>
    <g transform="translate(140,82)">
      <rect class="bar-fill b1" width="177" height="8" rx="2" fill="url(#barGrad)" transform-origin="0 0"/>
    </g>
  </g>

  <!-- JavaScript -->
  <g>
    <text x="20" y="112" font-size="10" fill="#4aaa77" class="fade-in f2">JavaScript</text>
    <text x="100" y="112" font-size="10" fill="#00ff88" class="stat-num n2">14%</text>
    <rect x="140" y="102" width="260" height="8" rx="2" fill="#0a1a0a"/>
    <g transform="translate(140,102)">
      <rect class="bar-fill b2" width="36" height="8" rx="2" fill="url(#barGrad)" transform-origin="0 0"/>
    </g>
  </g>

  <!-- C -->
  <g>
    <text x="20" y="132" font-size="10" fill="#4aaa77" class="fade-in f2">C</text>
    <text x="100" y="132" font-size="10" fill="#00ff88" class="stat-num n3">10%</text>
    <rect x="140" y="122" width="260" height="8" rx="2" fill="#0a1a0a"/>
    <g transform="translate(140,122)">
      <rect class="bar-fill b3" width="26" height="8" rx="2" fill="url(#barGrad)" transform-origin="0 0"/>
    </g>
  </g>

  <!-- HTML -->
  <g>
    <text x="20" y="152" font-size="10" fill="#4aaa77" class="fade-in f2">HTML</text>
    <text x="100" y="152" font-size="10" fill="#00ff88" class="stat-num n4">5%</text>
    <rect x="140" y="142" width="260" height="8" rx="2" fill="#0a1a0a"/>
    <g transform="translate(140,142)">
      <rect class="bar-fill b4" width="13" height="8" rx="2" fill="url(#barGrad)" transform-origin="0 0"/>
    </g>
  </g>

  <!-- Other -->
  <g>
    <text x="20" y="172" font-size="10" fill="#4aaa77" class="fade-in f2">Other</text>
    <text x="100" y="172" font-size="10" fill="#00ff88" class="stat-num n4">3%</text>
    <rect x="140" y="162" width="260" height="8" rx="2" fill="#0a1a0a"/>
    <g transform="translate(140,162)">
      <rect class="bar-fill b5" width="8" height="8" rx="2" fill="url(#barGradDim)" transform-origin="0 0"/>
    </g>
  </g>

  <!-- ── RIGHT PANEL: Stats cards ── -->
  <g class="fade-in f3">
    <text x="450" y="72" font-size="10" fill="#00ff88" opacity="0.5">profile_metrics:</text>
  </g>

  <!-- Repos -->
  <g class="stat-num n1">
    <rect x="450" y="82" width="190" height="48" rx="4" fill="#0a1a0a" stroke="#00ff88" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="465" y="102" font-size="10" fill="#4aaa77">public_repos</text>
    <text x="465" y="120" font-size="22" font-weight="700" fill="#00ff88">58</text>
    <text x="580" y="120" font-size="10" fill="#00ff88" opacity="0.4">and growing</text>
  </g>

  <!-- Stars -->
  <g class="stat-num n2">
    <rect x="652" y="82" width="228" height="48" rx="4" fill="#0a1a0a" stroke="#00ff88" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="667" y="102" font-size="10" fill="#4aaa77">total_stars</text>
    <text x="667" y="120" font-size="22" font-weight="700" fill="#00ff88">34</text>
    <text x="700" y="120" font-size="10" fill="#00ff88" opacity="0.4">⭐ earned</text>
  </g>

  <!-- Streak -->
  <g class="stat-num n3 streak-glow">
    <rect x="450" y="140" width="190" height="48" rx="4" fill="#0a2a15" stroke="#00ff88" stroke-width="1" stroke-opacity="0.6"/>
    <text x="465" y="160" font-size="10" fill="#4aaa77">commit_streak</text>
    <text x="465" y="178" font-size="22" font-weight="700" fill="#00ff88">🔥 active</text>
  </g>

  <!-- Achievements -->
  <g class="stat-num n4">
    <rect x="652" y="140" width="228" height="48" rx="4" fill="#0a1a0a" stroke="#00ff88" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="667" y="160" font-size="10" fill="#4aaa77">achievements</text>
    <text x="667" y="175" font-size="10" fill="#00ff88">Pull Shark · YOLO</text>
    <text x="667" y="188" font-size="10" fill="#00ff88">Pair · Quickdraw</text>
  </g>

  <!-- Bottom status -->
  <g class="fade-in f3">
    <circle cx="28" cy="207" r="4" fill="#00ff88" class="pulse-dot"/>
    <text x="40" y="211" font-size="9" fill="#00ff88" opacity="0.4">// stats powered by github-readme-stats · streak-stats · last updated May 2026</text>
  </g>
</svg>
