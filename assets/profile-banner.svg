<svg viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', Courier, monospace">
  <defs>
    <style>
      .scanline {
        animation: scanMove 6s linear infinite;
      }
      @keyframes scanMove {
        0% { transform: translateY(-280px); }
        100% { transform: translateY(280px); }
      }
      .cursor {
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .glitch-main {
        animation: glitch 8s infinite;
      }
      @keyframes glitch {
        0%, 92%, 100% { transform: translate(0,0); filter: none; }
        93% { transform: translate(-3px,0); filter: drop-shadow(3px 0 #00ff88); }
        94% { transform: translate(3px,0); filter: drop-shadow(-3px 0 #ff0055); }
        95% { transform: translate(0,0); filter: none; }
        96% { transform: translate(2px,1px); filter: drop-shadow(-2px 0 #00ff88); }
        97% { transform: translate(0,0); filter: none; }
      }
      .fade-in-1 { animation: fadeIn 0.5s ease 0.3s both; }
      .fade-in-2 { animation: fadeIn 0.5s ease 0.7s both; }
      .fade-in-3 { animation: fadeIn 0.5s ease 1.1s both; }
      .fade-in-4 { animation: fadeIn 0.5s ease 1.5s both; }
      .fade-in-5 { animation: fadeIn 0.5s ease 1.9s both; }
      .fade-in-6 { animation: fadeIn 0.5s ease 2.3s both; }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateX(-8px); }
        to { opacity: 1; transform: translateX(0); }
      }
      .tag-pulse {
        animation: tagPulse 3s ease-in-out infinite;
      }
      @keyframes tagPulse {
        0%, 100% { opacity: 0.7; }
        50% { opacity: 1; }
      }
      .border-draw {
        stroke-dasharray: 2400;
        stroke-dashoffset: 2400;
        animation: drawBorder 2s ease 0.1s forwards;
      }
      @keyframes drawBorder {
        to { stroke-dashoffset: 0; }
      }
      .dot-blink {
        animation: dotBlink 2s step-end infinite;
      }
      @keyframes dotBlink {
        0%, 100% { opacity: 1; }
        33% { opacity: 0.3; }
        66% { opacity: 0.7; }
      }
    </style>

    <!-- Noise filter -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Green glow -->
    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f0a"/>
      <stop offset="100%" stop-color="#050a05"/>
    </linearGradient>

    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00ff88" stop-opacity="1"/>
      <stop offset="70%" stop-color="#00ff88" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="mainClip">
      <rect width="900" height="280" rx="6"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" rx="6" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g clip-path="url(#mainClip)" opacity="0.06">
    <line x1="0" y1="40" x2="900" y2="40" stroke="#00ff88" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="900" y2="80" stroke="#00ff88" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="900" y2="120" stroke="#00ff88" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="900" y2="160" stroke="#00ff88" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="900" y2="200" stroke="#00ff88" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="900" y2="240" stroke="#00ff88" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="280" stroke="#00ff88" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="280" stroke="#00ff88" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="280" stroke="#00ff88" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="280" stroke="#00ff88" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="280" stroke="#00ff88" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="280" stroke="#00ff88" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="280" stroke="#00ff88" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="280" stroke="#00ff88" stroke-width="0.5"/>
  </g>

  <!-- Scanline effect -->
  <rect class="scanline" x="0" y="0" width="900" height="3" fill="#00ff88" opacity="0.04" clip-path="url(#mainClip)"/>

  <!-- Border -->
  <rect class="border-draw" x="1" y="1" width="898" height="278" rx="5" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.5"/>

  <!-- Corner decorations -->
  <g opacity="0.8">
    <line x1="0" y1="20" x2="20" y2="0" stroke="#00ff88" stroke-width="1"/>
    <line x1="880" y1="0" x2="900" y2="20" stroke="#00ff88" stroke-width="1"/>
    <line x1="0" y1="260" x2="20" y2="280" stroke="#00ff88" stroke-width="1"/>
    <line x1="880" y1="280" x2="900" y2="260" stroke="#00ff88" stroke-width="1"/>
  </g>

  <!-- Terminal prompt top-left -->
  <g class="fade-in-1">
    <text x="28" y="44" font-size="11" fill="#00ff88" opacity="0.5">~/abhinav25232354 $</text>
    <text x="28" y="44" font-size="11" fill="#00ff88" opacity="0.5" dx="178">whoami</text>
  </g>

  <!-- Main glitch name -->
  <g class="glitch-main" filter="url(#greenGlow)">
    <text x="28" y="108" font-size="52" font-weight="700" fill="#00ff88" letter-spacing="-1" font-family="'Courier New', monospace">ABHINAV</text>
  </g>
  <text x="28" y="108" font-size="52" font-weight="700" fill="none" stroke="#00ff88" stroke-width="0.5" letter-spacing="-1" opacity="0.3" font-family="'Courier New', monospace">ABHINAV</text>

  <!-- Dexterity Coder tag -->
  <g class="fade-in-2">
    <text x="30" y="135" font-size="14" fill="#00ff88" opacity="0.6" letter-spacing="4">// dexteritycoder</text>
  </g>

  <!-- Accent line -->
  <rect x="28" y="147" width="360" height="1" fill="url(#accentLine)" opacity="0.7" class="fade-in-3"/>

  <!-- Info lines -->
  <g class="fade-in-3">
    <text x="28" y="172" font-size="12" fill="#4aaa77" font-family="'Courier New', monospace">
      <tspan fill="#00ff88" opacity="0.5">role</tspan>
      <tspan fill="#555" dx="4">:</tspan>
      <tspan fill="#c8ffd8" dx="8">Software Developer · Passionate Engineer</tspan>
    </text>
  </g>
  <g class="fade-in-4">
    <text x="28" y="194" font-size="12" fill="#4aaa77" font-family="'Courier New', monospace">
      <tspan fill="#00ff88" opacity="0.5">stack</tspan>
      <tspan fill="#555" dx="4">:</tspan>
      <tspan fill="#c8ffd8" dx="8">Python · JS · C · Flask · Linux · ML</tspan>
    </text>
  </g>
  <g class="fade-in-5">
    <text x="28" y="216" font-size="12" fill="#4aaa77" font-family="'Courier New', monospace">
      <tspan fill="#00ff88" opacity="0.5">loc</tspan>
      <tspan fill="#555" dx="4">:</tspan>
      <tspan fill="#c8ffd8" dx="8">Allahabad, India</tspan>
    </text>
  </g>
  <g class="fade-in-6">
    <text x="28" y="238" font-size="12" fill="#4aaa77" font-family="'Courier New', monospace">
      <tspan fill="#00ff88" opacity="0.5">signal</tspan>
      <tspan fill="#555" dx="4">:</tspan>
      <tspan fill="#c8ffd8" dx="8">Build real things. Break to understand. Ship.</tspan>
    </text>
  </g>

  <!-- Status dot -->
  <g class="fade-in-6">
    <circle cx="28" cy="258" r="4" fill="#00ff88" class="dot-blink"/>
    <text x="40" y="262" font-size="10" fill="#00ff88" opacity="0.5" font-family="'Courier New', monospace">open to collaborate · available for opportunities</text>
  </g>

  <!-- Right side — big decorative number -->
  <g opacity="0.04">
    <text x="560" y="230" font-size="220" font-weight="900" fill="#00ff88" font-family="'Courier New', monospace">&gt;_</text>
  </g>

  <!-- Right side terminal window -->
  <g class="fade-in-2">
    <rect x="620" y="60" width="248" height="155" rx="4" fill="#0d1a0d" stroke="#00ff88" stroke-width="0.7" stroke-opacity="0.4"/>
    <!-- Window bar -->
    <rect x="620" y="60" width="248" height="22" rx="4" fill="#0f1f0f"/>
    <circle cx="636" cy="71" r="4" fill="#ff5f57" opacity="0.8"/>
    <circle cx="652" cy="71" r="4" fill="#ffbd2e" opacity="0.8"/>
    <circle cx="668" cy="71" r="4" fill="#28c940" opacity="0.8"/>
    <text x="688" y="75" font-size="9" fill="#00ff88" opacity="0.4" font-family="'Courier New', monospace">bash — abhinav@dev</text>

    <!-- Terminal content -->
    <text x="634" y="101" font-size="10" fill="#00ff88" opacity="0.6" font-family="'Courier New', monospace">$ git log --oneline -5</text>
    <text x="634" y="117" font-size="9.5" fill="#4aaa77" font-family="'Courier New', monospace">a1b2c3d feat: hand gesture ctrl</text>
    <text x="634" y="131" font-size="9.5" fill="#4aaa77" font-family="'Courier New', monospace">e4f5g6h fix: offline AI agent</text>
    <text x="634" y="145" font-size="9.5" fill="#4aaa77" font-family="'Courier New', monospace">i7j8k9l chore: linux config</text>
    <text x="634" y="159" font-size="9.5" fill="#4aaa77" font-family="'Courier New', monospace">m0n1o2p feat: crossdale pay</text>
    <text x="634" y="173" font-size="9.5" fill="#4aaa77" font-family="'Courier New', monospace">p3q4r5s feat: flask backend</text>
    <text x="634" y="193" font-size="10" fill="#00ff88" opacity="0.6" font-family="'Courier New', monospace">$ <tspan class="cursor">█</tspan></text>
  </g>
</svg>
